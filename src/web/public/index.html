<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyBot</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
<aside class="sidebar">
    <div class="brand">
        <div class="brand-mark">Ab</div>
        <div>
            <div class="brand-title">AnyBot</div>
            <div class="brand-subtitle">Codex + Feishu / Telegram</div>
        </div>
    </div>

    <button id="new-chat-btn" class="nav-btn nav-btn-primary">新建对话</button>
    <button id="chat-view-btn" class="nav-btn active">聊天</button>
    <button id="feishu-view-btn" class="nav-btn">Feishu</button>
    <button id="telegram-view-btn" class="nav-btn">Telegram</button>
    <button id="proxy-view-btn" class="nav-btn">代理</button>

    <div class="sidebar-section">
        <div class="sidebar-label">会话列表</div>
        <div id="history-list" class="history-list"></div>
    </div>

    <div class="sidebar-section">
        <label class="sidebar-label" for="model-select">Codex 模型</label>
        <select id="model-select" class="sidebar-select"></select>
    </div>
</aside>

<main class="main">
    <section id="chat-view" class="view active">
        <div id="messages" class="messages">
            <div class="empty-state">
                <div class="empty-title">AnyBot 已就绪</div>
                <div class="empty-subtitle">开始一段新对话，或先完成 Feishu 配置。</div>
            </div>
        </div>
        <div class="composer">
            <div id="attachment-preview" class="attachment-preview"></div>
            <div class="composer-row">
                <input id="file-input" type="file" multiple hidden>
                <button id="attach-btn" class="icon-btn" title="添加附件" aria-label="添加附件">+</button>
                <textarea id="chat-input" rows="1" placeholder="输入消息，Enter 发送，Shift + Enter 换行"></textarea>
                <button id="send-btn" class="send-btn" disabled>发送</button>
            </div>
        </div>
    </section>

    <section id="feishu-view" class="view">
        <div class="panel">
            <h1>Feishu</h1>
            <p class="panel-subtitle">配置企业协作场景下的消息通道。</p>

            <label class="field-toggle">
                <span>启用</span>
                <input id="feishu-enabled" type="checkbox">
            </label>

            <label class="field">
                <span>App ID</span>
                <input id="feishu-app-id" type="text" placeholder="cli_xxx">
            </label>

            <label class="field">
                <span>App Secret</span>
                <input id="feishu-app-secret" type="password" placeholder="请输入 App Secret">
            </label>

            <label class="field">
                <span>群聊响应方式</span>
                <select id="feishu-group-mode">
                    <option value="mention">仅被提及时响应</option>
                    <option value="all">接收全部消息</option>
                </select>
            </label>

            <label class="field">
                <span>Bot Open ID</span>
                <input id="feishu-bot-open-id" type="text" placeholder="ou_xxx">
            </label>

            <label class="field">
                <span>确认表情</span>
                <input id="feishu-ack-reaction" type="text" placeholder="OK">
            </label>

            <label class="field">
                <span>管理员会话 ID</span>
                <input id="feishu-owner-chat-id" type="text" placeholder="oc_xxx">
            </label>

            <div class="actions">
                <button id="save-feishu-btn" class="primary-btn">保存 Feishu 配置</button>
                <div id="feishu-status" class="status"></div>
            </div>
        </div>
    </section>

    <section id="telegram-view" class="view">
        <div class="panel">
            <h1>Telegram</h1>
            <p class="panel-subtitle">配置推荐用于个人助手场景的 Telegram long polling 通道。</p>

            <label class="field-toggle">
                <span>启用</span>
                <input id="telegram-enabled" type="checkbox">
            </label>

            <label class="field">
                <span>Bot Token</span>
                <input id="telegram-bot-token" type="password" placeholder="123456:ABC...">
            </label>

            <label class="field">
                <span>管理员会话 ID</span>
                <input id="telegram-owner-chat-id" type="text" placeholder="首次私聊后可自动记录">
            </label>

            <label class="field-toggle">
                <span>仅私聊</span>
                <input id="telegram-private-only" type="checkbox" checked>
            </label>

            <label class="field-toggle">
                <span>允许群聊</span>
                <input id="telegram-allow-groups" type="checkbox">
            </label>

            <label class="field">
                <span>Polling 超时（秒）</span>
                <input id="telegram-polling-timeout" type="number" min="1" max="50" placeholder="30">
            </label>

            <div class="actions">
                <button id="save-telegram-btn" class="primary-btn">保存 Telegram 配置</button>
                <div id="telegram-status" class="status"></div>
            </div>
        </div>
    </section>

    <section id="proxy-view" class="view">
        <div class="panel">
            <h1>代理</h1>
            <p class="panel-subtitle">为所有出站请求配置可选的全局代理。</p>

            <label class="field-toggle">
                <span>启用</span>
                <input id="proxy-enabled" type="checkbox">
            </label>

            <label class="field">
                <span>协议</span>
                <select id="proxy-protocol">
                    <option value="http">http</option>
                    <option value="socks5">socks5</option>
                </select>
            </label>

            <label class="field">
                <span>主机地址</span>
                <input id="proxy-host" type="text" placeholder="127.0.0.1">
            </label>

            <label class="field">
                <span>端口</span>
                <input id="proxy-port" type="number" placeholder="7890">
            </label>

            <label class="field">
                <span>用户名</span>
                <input id="proxy-username" type="text" placeholder="可选">
            </label>

            <label class="field">
                <span>密码</span>
                <input id="proxy-password" type="password" placeholder="可选">
            </label>

            <div class="actions">
                <button id="save-proxy-btn" class="primary-btn">保存代理配置</button>
                <button id="test-proxy-btn" class="secondary-btn">测试代理</button>
                <div id="proxy-status" class="status"></div>
            </div>
        </div>
    </section>
</main>

<script src="scripts/app.js"></script>
</body>
</html>
