<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-top">
        <div class="logo">
            <div class="logo-icon">Ab</div>
            <span class="logo-text">Any<span>Bot</span></span>
        </div>
        <button id="new-chat-btn" class="active">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            新对话
        </button>
        <button id="channels-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1.5 5h11M1.5 9h11M5 1.5l-1.5 11M10.5 1.5L9 12.5" stroke="currentColor" stroke-width="1.2"
                      stroke-linecap="round"/>
            </svg>
            频道
        </button>
        <button id="skills-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1L8.5 4.5L12.5 5L9.75 7.5L10.5 11.5L7 9.5L3.5 11.5L4.25 7.5L1.5 5L5.5 4.5L7 1Z" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            技能
        </button>
        <button id="proxy-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1C4.24 1 2 3.24 2 6c0 1.86 1.02 3.49 2.53 4.35L4 12.5h6l-.53-2.15C10.98 9.49 12 7.86 12 6c0-2.76-2.24-5-5-5z" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="7" cy="6" r="1.5" stroke="currentColor" stroke-width="1.1"/>
            </svg>
            代理
        </button>
    </div>

    <div class="sidebar-label">对话历史</div>
    <div class="history-list" id="history-list"></div>

    <div class="sidebar-footer">
        <div class="provider-switcher" id="provider-switcher">
            <div class="provider-dropdown" id="provider-dropdown"></div>
            <div class="provider-badge" id="provider-badge">
                <div class="model-dot" style="background:#5cb85c"></div>
                <span>提供商</span>
                <span class="provider-name" id="current-provider-name">加载中…</span>
                <svg class="provider-badge-arrow" viewBox="0 0 12 12" fill="none">
                    <path d="M3 5l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
        <div class="model-switcher" id="model-switcher">
            <div class="model-dropdown" id="model-dropdown"></div>
            <div class="model-badge" id="model-badge">
                <div class="model-dot"></div>
                <span>模型</span>
                <span class="model-name" id="current-model-name">加载中…</span>
                <svg class="model-badge-arrow" viewBox="0 0 12 12" fill="none">
                    <path d="M3 5l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
    </div>
</aside>

<main id="main">
    <div id="chat-view">
        <div id="messages">
            <div id="empty-state">
                <div class="empty-icon">Ab</div>
                <div class="empty-title">AnyBot 已就绪</div>
                <div class="empty-sub">发送消息，开始你的对话</div>
            </div>
        </div>

        <div id="input-area">
            <div class="input-wrapper">
                <textarea id="chat-input" placeholder="发送消息..." rows="1"></textarea>
                <button id="send-btn" disabled>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M2 7h10M7.5 2.5L12 7l-4.5 4.5" stroke="white" stroke-width="1.6" stroke-linecap="round"
                              stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="input-hint"><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</div>
        </div>
    </div>

    <div id="channel-view" style="display:none;"></div>
    <div id="skills-view" style="display:none;"></div>
    <div id="proxy-view" style="display:none;"></div>
</main>

<script src="scripts/app.js"></script>
</body>
</html>
